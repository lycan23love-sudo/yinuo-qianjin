<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 深棕色背景 -->
  <rect width="512" height="512" rx="80" fill="#2A1A08"/>
  <!-- 金色光晕 -->
  <radialGradient id="glow" cx="50%" cy="45%" r="50%">
    <stop offset="0%" stop-color="#E8B84A" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#2A1A08" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="80" fill="url(#glow)"/>
  <!-- "誓" 字 -->
  <text x="256" y="320" 
    text-anchor="middle" 
    font-family="serif" 
    font-size="280" 
    font-weight="900"
    fill="#C8922A">誓</text>
  <!-- 底部金线 -->
  <rect x="96" y="390" width="320" height="4" rx="2" fill="#C8922A" opacity="0.6"/>
  <!-- 底部小字 -->
  <text x="256" y="440"
    text-anchor="middle"
    font-family="serif"
    font-size="48"
    fill="#E8B84A"
    opacity="0.8"
    letter-spacing="8">一诺千金</text>
</svg>
